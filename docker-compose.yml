version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcp-sql-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - DATABASE_URL=${DATABASE_URL:-}
      - DEFAULT_JDBC_URL=${DEFAULT_JDBC_URL:-}
      - DEFAULT_DB_USER=${DEFAULT_DB_USER:-}
      - DEFAULT_DB_PASSWORD=${DEFAULT_DB_PASSWORD:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mcp-sql-frontend
    restart: always
    ports:
      - "80:5173"
    environment:
      - BACKEND_URL=backend:8000
    depends_on:
      - backend

